title: Bash TCP Reverse Shell Pattern
id: ds-linux-0002
status: test
description: Detects bash command lines using /dev/tcp redirection, a common reverse shell pattern.
references:
  - https://attack.mitre.org/techniques/T1059/004/
author: Detectsmith
date: 2026/05/21
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains: /dev/tcp/
  condition: selection
falsepositives:
  - Network troubleshooting one-liners may use /dev/tcp in controlled environments.
level: high
tags:
  - attack.execution
  - attack.t1059.004
